name: ibigan

services:

  # ── PHP-FPM — Laravel 12 / PHP 8.4 ───────────────────────────
  app:
    build:
      context: ./docker/php
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
        INSTALL_XDEBUG: ${INSTALL_XDEBUG:-0}
    container_name: ibigan_app
    restart: unless-stopped
    volumes:
      - ./projects/ibigan-api:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - ibigan_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Nginx ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ibigan_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./projects/ibigan-api:/var/www:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - ibigan_network
    depends_on:
      - app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── MySQL 8.4 ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: ibigan_mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ibigan_central}
      MYSQL_USER: ${MYSQL_USER:-dev}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dev}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ibigan_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ibigan_redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - ibigan_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Horizon ───────────────────────────────────────────────────
  horizon:
    build:
      context: ./docker/php
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
        INSTALL_XDEBUG: 0
    container_name: ibigan_horizon
    restart: unless-stopped
    volumes:
      - ./projects/ibigan-api:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - ibigan_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan horizon

  # ── Scheduler ─────────────────────────────────────────────────
  scheduler:
    build:
      context: ./docker/php
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
        INSTALL_XDEBUG: 0
    container_name: ibigan_scheduler
    restart: unless-stopped
    volumes:
      - ./projects/ibigan-api:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - ibigan_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan schedule:work

  # ── Reverb (WebSockets) ───────────────────────────────────────
  reverb:
    build:
      context: ./docker/php
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
        INSTALL_XDEBUG: 0
    container_name: ibigan_reverb
    restart: unless-stopped
    ports:
      - "${REVERB_PORT:-8082}:8080"
    volumes:
      - ./projects/ibigan-api:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - ibigan_network
    depends_on:
      - redis
    command: php artisan reverb:start --host=0.0.0.0 --port=8080

  # ── Vite (React SPA) ──────────────────────────────────────────
  vite:
    build: ./docker/vite
    container_name: ibigan_vite
    restart: unless-stopped
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./projects/ibigan-web:/usr/src/app
      - vite_node_modules:/usr/src/app/node_modules
    networks:
      - ibigan_network
    command: sh -c "npm install --force && npm run dev -- --host 0.0.0.0 --port 5173"

  # ── Mailpit ───────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: ibigan_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - ibigan_network

  # ── phpMyAdmin ────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: ibigan_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8080}:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      UPLOAD_LIMIT: 300M
    networks:
      - ibigan_network
    depends_on:
      mysql:
        condition: service_healthy

networks:
  ibigan_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  vite_node_modules:
