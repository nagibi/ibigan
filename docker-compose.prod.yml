name: ibigan

services:

  # ── PHP-FPM — Laravel 12 / PHP 8.4 ───────────────────────────
  app:
    build:
      context: ./docker/php
      args:
        USER_ID: 1000
        GROUP_ID: 1000
        INSTALL_XDEBUG: 0
    container_name: ibigan_app
    restart: unless-stopped
    volumes:
      - ./projects/ibigan-api:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - ibigan_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Nginx ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ibigan_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./projects/ibigan-api:/var/www
      - ./projects/ibigan-web/dist:/var/www/spa
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - ibigan_network
    depends_on:
      - app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── MySQL 8.4 ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: ibigan_mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ibigan_central}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ibigan_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ibigan_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - ibigan_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Horizon ───────────────────────────────────────────────────
  horizon:
    build:
      context: ./docker/php
      args:
        USER_ID: 1000
        GROUP_ID: 1000
        INSTALL_XDEBUG: 0
    container_name: ibigan_horizon
    restart: unless-stopped
    volumes:
      - ./projects/ibigan-api:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - ibigan_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan horizon

  # ── Scheduler ─────────────────────────────────────────────────
  scheduler:
    build:
      context: ./docker/php
      args:
        USER_ID: 1000
        GROUP_ID: 1000
        INSTALL_XDEBUG: 0
    container_name: ibigan_scheduler
    restart: unless-stopped
    volumes:
      - ./projects/ibigan-api:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - ibigan_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan schedule:work

  # ── Reverb (WebSockets) ───────────────────────────────────────
  reverb:
    build:
      context: ./docker/php
      args:
        USER_ID: 1000
        GROUP_ID: 1000
        INSTALL_XDEBUG: 0
    container_name: ibigan_reverb
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - ./projects/ibigan-api:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - ibigan_network
    depends_on:
      - redis
    command: php artisan reverb:start --host=0.0.0.0 --port=8080

networks:
  ibigan_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
