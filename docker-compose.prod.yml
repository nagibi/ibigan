# Produção — um stack por instalação (/opt/ibigan, /opt/nagibi, …).
# Defina STACK_NAME e portas no .env da raiz para evitar conflito no mesmo servidor.
name: ${STACK_NAME:-ibigan}

services:

  # ── PHP-FPM — Laravel 12 / PHP 8.4 ───────────────────────────
  app:
    build:
      context: ./docker/php
      args:
        USER_ID: 1000
        GROUP_ID: 1000
        INSTALL_XDEBUG: 0
    container_name: ${STACK_NAME:-ibigan}_app
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
    volumes:
      - ./projects/ibigan-api:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - stack_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Nginx ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ${STACK_NAME:-ibigan}_nginx
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
    ports:
      - "${NGINX_HTTP_BIND:-0.0.0.0}:${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_BIND:-0.0.0.0}:${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./projects/ibigan-api:/var/www
      - ./projects/ibigan-web/dist:/var/www/spa
      - ./docker/nginx/conf.d/production.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - stack_network
    depends_on:
      - app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── MySQL 8.4 ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: ${STACK_NAME:-ibigan}_mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3306}:3306"
    environment:
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ibigan_central}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: ["mysqld", "--default-time-zone=-03:00"]
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - stack_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ${STACK_NAME:-ibigan}_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - stack_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Meilisearch ───────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: ${STACK_NAME:-ibigan}_meilisearch
    restart: unless-stopped
    networks:
      - stack_network
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_ENV: production
      MEILI_EXPERIMENTAL_ENABLE_METRICS: "true"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Horizon ───────────────────────────────────────────────────
  horizon:
    build:
      context: ./docker/php
      args:
        USER_ID: 1000
        GROUP_ID: 1000
        INSTALL_XDEBUG: 0
    container_name: ${STACK_NAME:-ibigan}_horizon
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
    volumes:
      - ./projects/ibigan-api:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - stack_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    command: php artisan horizon

  # ── Scheduler ─────────────────────────────────────────────────
  scheduler:
    build:
      context: ./docker/php
      args:
        USER_ID: 1000
        GROUP_ID: 1000
        INSTALL_XDEBUG: 0
    container_name: ${STACK_NAME:-ibigan}_scheduler
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
    volumes:
      - ./projects/ibigan-api:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - stack_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan schedule:work

  # ── Reverb (WebSockets) ───────────────────────────────────────
  # WebSocket público via nginx (/app/ → reverb:8080). Não publicar porta no host
  # evita conflito quando há vários stacks no mesmo servidor (8082, 8083, …).
  reverb:
    build:
      context: ./docker/php
      args:
        USER_ID: 1000
        GROUP_ID: 1000
        INSTALL_XDEBUG: 0
    container_name: ${STACK_NAME:-ibigan}_reverb
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
    volumes:
      - ./projects/ibigan-api:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - stack_network
    depends_on:
      - redis
    command: php artisan reverb:start --host=0.0.0.0 --port=8080

networks:
  stack_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  meili_data:
