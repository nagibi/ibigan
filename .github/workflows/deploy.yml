name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: projects/ibigan-web/package-lock.json

      - name: Install frontend dependencies
        run: npm install --force
        working-directory: projects/ibigan-web

      - name: Build frontend
        run: |
          cat > .env.production << 'EOF'
          VITE_API_URL=https://ibigan.com.br/api
          VITE_APP_NAME=Ibigan
          VITE_REVERB_APP_KEY=xu6y2ryaemtltwri5ulq
          VITE_REVERB_HOST=ibigan.com.br
          VITE_REVERB_PORT=443
          VITE_REVERB_SCHEME=https
          EOF
          npm run build
        working-directory: projects/ibigan-web

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='projects/ibigan-api/vendor' \
            --exclude='projects/ibigan-api/node_modules' \
            --exclude='projects/ibigan-api/storage/logs' \
            --exclude='projects/ibigan-api/.env' \
            --exclude='projects/ibigan-web/node_modules' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ root@${{ secrets.SERVER_IP }}:/opt/ibigan/

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_IP }} << 'EOF'
            set -e
            chmod +x /opt/ibigan/scripts/deploy-prod.sh
            /opt/ibigan/scripts/deploy-prod.sh
          EOF
