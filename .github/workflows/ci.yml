name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Laravel Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, redis, gd, zip, bcmath, pcntl, intl, sockets
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
        working-directory: projects/ibigan-api

      - name: Copy env
        run: cp .env.example .env
        working-directory: projects/ibigan-api

      - name: Generate key
        run: php artisan key:generate
        working-directory: projects/ibigan-api

      - name: Run tests
        run: php artisan test --parallel
        working-directory: projects/ibigan-api

  frontend:
    name: React Type Check + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: projects/ibigan-web/package-lock.json

      - name: Install dependencies
        run: npm install --force
        working-directory: projects/ibigan-web

      - name: Type check
        run: npx tsc --noEmit
        working-directory: projects/ibigan-web

      - name: Build
        run: npm run build
        working-directory: projects/ibigan-web
