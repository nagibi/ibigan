server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/nagibi.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nagibi.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/public;
    index index.php;
    charset utf-8;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Re-resolve app/reverb após rebuild dos containers (DNS interno do Docker).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Arquivos estáticos da SPA
    location ~* \.(ico|css|js|gif|jpeg|jpg|png|svg|woff|woff2|ttf|eot)$ {
        root /var/www/spa;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location /api/ {
        root /var/www/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /docs/ {
        root /var/www/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /horizon {
        root /var/www/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        root /var/www/spa;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~ \.php$ {
        set $php_upstream app:9000;
        fastcgi_pass   $php_upstream;
        fastcgi_index  index.php;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO       $fastcgi_path_info;
        fastcgi_param  HTTPS on;
        fastcgi_param  HTTP_X_FORWARDED_PROTO https;
        fastcgi_read_timeout 300;
    }

    location /app/ {
        set $reverb_upstream reverb:8080;
        proxy_pass         http://$reverb_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    location /storage/ {
        alias /var/www/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location ~ ^/storage/tenant(.+)$ {
        alias /var/www/storage/tenant$1;
        expires 30d;
        add_header Cache-Control "public";
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
