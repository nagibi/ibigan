# Desenvolvimento local — HTTP apenas (sem SSL).
# Ativado via docker-compose.override.yml

server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php;
    charset utf-8;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location ^~ /storage/tenant {
        alias /var/www/storage/tenant;
        expires 7d;
        add_header Cache-Control "public";
    }

    location ^~ /storage/ {
        alias /var/www/storage/app/public/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /docs/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /horizon {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /telescope {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /clockwork {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /__clockwork {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /log-viewer {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /app/ {
        set $reverb_upstream reverb:8080;
        proxy_pass         http://$reverb_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # Vite pre-bundled deps live under node_modules/.vite — must win over the dotfile deny below.
    location ^~ /node_modules/ {
        set $vite_upstream vite:5173;
        proxy_pass         http://$vite_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        set $vite_upstream vite:5173;
        proxy_pass         http://$vite_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ~ \.php$ {
        set $php_upstream app:9000;
        fastcgi_pass   $php_upstream;
        fastcgi_index  index.php;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
